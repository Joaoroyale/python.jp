<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Q-Acadêmico Web</title>

<style>
body {
    margin: 0;
    font-family: Tahoma, Arial, sans-serif;

    /* FUNDO */
    background-image: url("fundo2.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* ESCURECER FUNDO */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.3);
    z-index: -1;
}

/* CAIXA (DOBRO) */
.box {
    width: 1000px;
    max-width: 95%;   /* mantém seguro no celular */
    background: #ded5c4;
    border-radius: 10px;
    padding: 40px;
    border: 1px solid #c9bfae;
}

/* TITULO */
h2 {
    font-size: 22px;
    margin: 0;
}

/* TEXTO */
small {
    font-size: 12px;
    color: #333;
}

/* FORM */
label {
    display: block;
    font-size: 13px;
    margin-top: 12px;
}

input {
    width: 100%;
    height: 30px;
    border: 1px solid #888;
}

/* CHECKBOX */
.mostrar-senha {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 10px;
    font-size: 13px;
}

.mostrar-senha input {
    width: auto;
    height: auto;
}

/* BOTÃO */
button {
    margin-top: 15px;
    padding: 8px 16px;
    font-size: 13px;
}

/* LINK */
.link {
    font-size: 12px;
    color: blue;
    display: block;
    margin-top: 12px;
}

/* RESPONSIVO */
@media (max-width: 500px) {
    .box {
        width: 95%;
        padding: 20px;
    }
}
</style>

</head>

<body>

<div class="box">
    <h2>Bem vindo ao <b>Q-Acadêmico Web</b></h2>
    <small>Um site que facilita as suas atividades.</small>

    <label>Login</label>
    <input type="text">

    <label>Senha</label>
    <input type="password" id="senha">

    <div class="mostrar-senha">
        <input type="checkbox" id="checkSenha" onclick="mostrarSenha()">
        <label for="checkSenha">Mostrar senha</label>
    </div>

    <button>OK</button>

    <a class="link">Primeiro acesso e recuperação de senha</a>
</div>

<script>
function mostrarSenha() {
    const input = document.getElementById("senha");
    input.type = input.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
